services:
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: sr_volga_nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - php
    restart: unless-stopped
    networks:
      - app-network

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: sr_volga_php
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_URL=http://localhost
    restart: unless-stopped
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: sr_volga_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: sr_volga
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - app-network

  node:
    build:
      context: ./docker/node
      dockerfile: Dockerfile
    container_name: sr_volga_node
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    command: sh -c "npm install && npm run dev -- --host"
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge